<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2ff" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#7000ff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Neon Grid -->
  <g stroke="#00f2ff" stroke-width="2" stroke-opacity="0.15">
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
  </g>

  <!-- Glow behind Pac-Man -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>

  <!-- Neon Border -->
  <rect width="480" height="480" x="16" y="16" rx="96" fill="none" stroke="#00f2ff" stroke-width="8" stroke-opacity="0.5"/>

  <!-- Yellow Pac-Man -->
  <path d="M256 256 L429 156 A200 200 0 1 0 429 356 Z" fill="#FFE800" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Eye -->
  <circle cx="256" cy="130" r="24" fill="#050505"/>
</svg>
